# ===============================
# VertexPlacements API - Production Profile (Day 7)
# Activate with: --spring.profiles.active=prod
# All values are sourced from environment variables so this file
# can be committed safely with no real secrets inside it.
# ===============================

server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

logging.level.org.springframework.web=WARN
logging.level.com.vertexplacements.trackerapi=INFO

# ---- JWT Authentication ----
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

app.admin-password=${ADMIN_PASSWORD:}
app.seed-demo-data=${SEED_DEMO_DATA:false}